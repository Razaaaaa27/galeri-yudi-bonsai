<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — Galeri Yudi</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="login-bg">
    <div class="login-bg__orb login-bg__orb--1"></div>
    <div class="login-bg__orb login-bg__orb--2"></div>
    <div class="login-bg__orb login-bg__orb--3"></div>
    <div class="login-bg__leaf login-bg__leaf--1">🍃</div>
    <div class="login-bg__leaf login-bg__leaf--2">🌿</div>
    <div class="login-bg__leaf login-bg__leaf--3">🍂</div>
    <div class="login-bg__leaf login-bg__leaf--4">🌱</div>
    <div class="login-bg__leaf login-bg__leaf--5">🍃</div>
  </div>

  <!-- Login Card -->
  <main class="login-wrapper">
    <div class="login-card" id="login-card">
      <!-- Logo Section -->
      <div class="login-card__header">
        <a href="index.html" class="login-card__back" title="Kembali ke website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </a>
        <div class="login-card__logo">
          <div class="login-card__logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <span class="login-card__logo-text">Galeri Yudi</span>
          <span class="login-card__badge">Admin Panel</span>
        </div>
        <h1 class="login-card__title">Selamat Datang Kembali</h1>
        <p class="login-card__subtitle">Masuk ke dashboard admin untuk mengelola produk dan katalog Anda.</p>
      </div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" autocomplete="off">
        <!-- Username -->
        <div class="login-form__group">
          <label for="login-username" class="login-form__label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Username
          </label>
          <input type="text" id="login-username" class="login-form__input" placeholder="Masukkan username" required autofocus>
        </div>

        <!-- Password -->
        <div class="login-form__group">
          <label for="login-password" class="login-form__label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </label>
          <div class="login-form__password-wrap">
            <input type="password" id="login-password" class="login-form__input" placeholder="Masukkan password" required>
            <button type="button" class="login-form__eye" id="toggle-password" title="Tampilkan password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Error Message -->
        <div class="login-form__error" id="login-error">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span id="login-error-text">Username atau password salah.</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="login-form__submit" id="login-submit">
          <span class="login-form__submit-text">Masuk ke Dashboard</span>
          <span class="login-form__submit-loader" id="login-loader">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10" stroke-dasharray="31.42" stroke-dashoffset="10"/>
            </svg>
          </span>
          <svg class="login-form__submit-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-card__footer">
        <a href="index.html" class="login-card__footer-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Kembali ke Website
        </a>
      </div>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
